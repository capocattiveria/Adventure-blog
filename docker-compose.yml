version: "3.9"

services:

  # ── Dev Container ─────────────────────────────────────────────────────────
  # VS Code si aggancia a questo container.
  # Non fa girare l'app: ci pensi tu da terminale con `air` o `go run`.
  devcontainer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached          # monta la root del monorepo
      - go-pkg-mod:/home/vscode/go/pkg/mod          # moduli Go (sopravvive ai rebuild)
      - go-build-cache:/home/vscode/.cache/go-build # build cache Go
      - go-bin:/home/vscode/go/bin                  # binari Go (air, golangci-lint, ecc.)
    command: sleep infinity            # tiene il container vivo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-adventure}:${POSTGRES_PASSWORD:-adventure_secret}@postgres:5432/${POSTGRES_DB:-adventure_blog}?sslmode=disable
      REDIS_URL: redis://redis:6379

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: adventure_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adventure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adventure_secret}
      POSTGRES_DB: ${POSTGRES_DB:-adventure_blog}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adventure}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: adventure_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  go-pkg-mod:
  go-build-cache:
  go-bin: